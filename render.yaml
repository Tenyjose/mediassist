# MediAssist — Render deployment
#
# IMPORTANT — service names become public subdomains:
#   https://{name}.onrender.com
# If a name is already taken, Render will ask you to rename it.
# Update the APPOINTMENTS_API_URL, RETRIEVAL_API_URL, and
# REACT_APP_CONVERSATION_API values below to match whatever names
# you end up with before your first deploy.
#
# WARNING — retrieval-api installs PyTorch + sentence-transformers (~2 GB image).
# The free tier (512 MB RAM) may OOM at startup. If it crashes, upgrade
# that one service to the Starter plan ($7/mo) or swap the embedding
# model for a lighter alternative.
#
# Free tier services spin down after 15 min of inactivity.
# First request after a cold start can take 30-60 s.

services:
  # ── Mock Appointments API ──────────────────────────────────────────
  - type: web
    name: mediassist-appointments
    env: docker
    dockerfilePath: ./mock-appointments-api/Dockerfile
    dockerContext: ./mock-appointments-api
    plan: free
    port: 8001
    envVars:
      - key: JWT_SECRET
        generateValue: true   # Render generates a secure random value

  # ── Retrieval API (ChromaDB + sentence-transformers + Claude) ──────
  - type: web
    name: mediassist-retrieval
    env: docker
    dockerfilePath: ./retrieval-api/Dockerfile
    dockerContext: ./retrieval-api
    plan: free               # See RAM warning above
    port: 8000
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false           # Set this in the Render dashboard

  # ── Conversation API (Claude brain + tool use) ─────────────────────
  - type: web
    name: mediassist-conversation
    env: docker
    dockerfilePath: ./conversation-api/Dockerfile
    dockerContext: ./conversation-api
    plan: free
    port: 8002
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false           # Set this in the Render dashboard
      - key: APPOINTMENTS_API_URL
        value: https://mediassist-appointments.onrender.com
      - key: RETRIEVAL_API_URL
        value: https://mediassist-retrieval.onrender.com

  # ── Frontend (React static site) ───────────────────────────────────
  - type: web
    name: mediassist-ui
    env: static
    buildCommand: npm --prefix frontend install && npm --prefix frontend run build
    staticPublishPath: ./frontend/build
    envVars:
      - key: REACT_APP_CONVERSATION_API
        value: https://mediassist-conversation.onrender.com
